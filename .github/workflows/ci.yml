name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pip install ruff mypy

      - name: Lint with ruff
        run: ruff check nice_sar/ tests/

      - name: Format check with ruff
        run: ruff format --check nice_sar/ tests/

      - name: Type check with mypy
        run: mypy nice_sar/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ --cov=nice_sar --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
